<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🛒 My Store</h1>

<div class="container">
    {% for p in products %}
    <div class="card">
        <h2>{{ p.name }}</h2>
        <p>₹{{ p.price }}</p>
        <a href="/add/{{ p.id }}">Add to Cart</a>
    </div>
    {% endfor %}
</div>

<br>
<a href="/cart">Go to Cart</a>

</body>
</html>
